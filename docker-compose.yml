version: "3.9"

services:
  db:
    image: postgres:17-alpine
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started
    environment:
      - API_URL=http://api:8080
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
